<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Employee</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

<h2>Edit Employee</h2>

<form th:action="@{/update}" method="post">

<input type="hidden" th:value="${employee.id}" name="id">

<div class="mb-3">
<input class="form-control" name="name" th:value="${employee.name}">
</div>

<div class="mb-3">
<input class="form-control" name="email" th:value="${employee.email}">
</div>

<div class="mb-3">
<input class="form-control" name="department" th:value="${employee.department}">
</div>

<div class="mb-3">
<input class="form-control" name="salary" th:value="${employee.salary}">
</div>

<button class="btn btn-primary">Update Employee</button>

</form>

</body>
</html>
