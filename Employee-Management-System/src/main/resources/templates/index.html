<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
            <h2>Employee Management System</h2>
        </div>

        <div class="card-body">

            <form th:action="@{/save}" method="post">

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" class="form-control" name="name" placeholder="Employee Name" required>
                    </div>

                    <div class="col">
                        <input type="email" class="form-control" name="email" placeholder="Employee Email" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" class="form-control" name="department" placeholder="Department" required>
                    </div>

                    <div class="col">
                        <input type="number" class="form-control" name="salary" placeholder="Salary" required>
                    </div>
                </div>

                <div class="text-center">
                    <button class="btn btn-success px-4">Add Employee</button>
                </div>

            </form>

        </div>
    </div>

    <div class="card mt-4 shadow">
        <div class="card-header bg-dark text-white">
            <h4>Employee List</h4>
        </div>
<div class="row mb-4">

<div class="row mb-3">

<div class="col-md-6">

<form th:action="@{/search}" method="get" class="d-flex">

<input type="text" name="keyword" class="form-control me-2"
placeholder="Search employee by name">

<button class="btn btn-primary">Search</button>

</form>

</div>

</div>
</div>

</div>
        <div class="card-body">

            <table class="table table-bordered table-hover">
                <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
<tr th:each="emp : ${employees}">
<td th:text="${emp.id}"></td>
<td th:text="${emp.name}"></td>
<td th:text="${emp.email}"></td>
<td th:text="${emp.department}"></td>
<td th:text="${emp.salary}"></td>

<td>

<a th:href="@{/edit/{id}(id=${emp.id})}" 
   class="btn btn-warning btn-sm">
   Edit
</a>

<a th:href="@{/delete/{id}(id=${emp.id})}" 
   class="btn btn-danger btn-sm">
   Delete
</a>

</td>

</tr>
</tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
